# config/packages/webauthn.yaml
webauthn:
    # Classe qui gere le stockage des credentials en BDD
    credential_repository: Webauthn\Bundle\Repository\DummyPublicKeyCredentialSourceRepository
 
    # Classe qui gere les utilisateurs
    user_repository: Webauthn\Bundle\Repository\DummyPublicKeyCredentialUserEntityRepository
 
    # Profil pour l'enregistrement d'une nouvelle passkey
    creation_profiles:
        default:
            rp:
                # Nom affiché dans la popup biometrique du navigateur
                name: '%env(WEBAUTHN_RP_NAME)%'
                # Doit correspondre EXACTEMENT au domaine de l'app (localhost en dev)
                id: '%env(APP_DOMAIN)%'
            challenge_length: 32
            timeout: 60000   # 60 secondes pour l'utilisateur
            authenticator_selection_criteria:
                user_verification: preferred
                resident_key: preferred
            attestation_conveyance: none
 
    # Profil pour la connexion avec une passkey existante
    request_profiles:
        default:
            rp_id: '%env(APP_DOMAIN)%'
            challenge_length: 32
            timeout: 60000
            user_verification: preferred
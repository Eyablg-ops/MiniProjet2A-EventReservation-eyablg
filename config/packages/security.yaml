# Configuration sécurité — JWT + Passkeys + Form Login
security:
    # =======================
    # Password hashing
    # =======================
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # =======================
    # User providers
    # =======================
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # =======================
    # Firewalls
    # =======================
    firewalls:
        # Dev tools (profiler, css, js, images)
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Auth API routes that are public (register, etc.)
        auth_api:
            pattern: ^/api/auth
            stateless: true
            security: false

        # API login endpoint (JSON login)
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: username
                password_path: password

        # All other API routes (JWT)
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # Web routes (form login)
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: /events
                username_parameter: email
                password_parameter: password
                enable_csrf: true
            logout:
                path: app_logout
                target: /login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    # =======================
    # Access control
    # =======================
    access_control:
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/events/?$, roles: PUBLIC_ACCESS }
        - { path: ^/events/\d+$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/reservations, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }

# =======================
# Test environment overrides
# =======================
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
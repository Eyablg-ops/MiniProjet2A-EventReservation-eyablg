# docker/nginx/conf.d/app.conf
server {
    listen 80;
    server_name localhost;
    root /var/www/public;      # Pointe vers le dossier public de Symfony
 
    # Essayer de servir le fichier directement, sinon passer a index.php
    location / {
        try_files $uri /index.php$is_args$args;
    }
 
    # Toutes les requetes .php sont transmises a PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;          # 'php' = nom du service dans docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
 
    # Ne pas servir les fichiers caches Symfony
    location ~ /\. {
        deny all;
    }
}
